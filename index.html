<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Belief Field — The Data Behind the Voice</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --text:#dbe7ff;
    --dim:#7d8db3;
    --cyan:#7fd9ff;
    --amber:#ffc472;
    --panel-bg:rgba(8,13,28,0.7);
    --panel-border:rgba(127,217,255,0.18);
    --amber-border:rgba(255,196,114,0.30);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 110% 80% at 50% 35%, #1c2742 0%, #131a2e 50%, #0a1020 100%);
    background-attachment:fixed;
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    padding:42px 30px 60px;
  }
  .wrap{max-width:1400px;margin:0 auto;}

  /* 1. uppercase mono label */
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;letter-spacing:0.34em;text-transform:uppercase;
    color:var(--dim);opacity:0.85;margin:0 0 4px 2px;
  }
  .title{
    font-family:'Space Grotesk',sans-serif;font-weight:700;
    font-size:30px;letter-spacing:0.01em;color:var(--text);
    margin:0 0 22px 2px;line-height:1.1;
  }
  .title .faint{color:var(--dim);font-weight:400;}
  .subject{
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.2em;
    text-transform:uppercase;color:var(--cyan);opacity:0.75;margin:-16px 0 22px 3px;
  }

  /* 2. stat bar */
  .statbar{
    display:flex;flex-wrap:wrap;align-items:stretch;
    border:1px solid var(--amber-border);border-radius:16px;
    background:rgba(255,196,114,0.04);
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    padding:18px 12px;margin-bottom:26px;
  }
  .stat{flex:1 1 0;min-width:120px;text-align:center;padding:6px 10px;position:relative;}
  .stat + .stat::before{
    content:"";position:absolute;left:0;top:18%;height:64%;width:1px;
    background:linear-gradient(180deg,transparent,rgba(255,196,114,0.22),transparent);
  }
  .stat .num{
    font-family:'Cormorant Garamond',serif;font-weight:700;
    font-size:48px;line-height:1;color:var(--amber);letter-spacing:0.01em;
    text-shadow:0 0 22px rgba(255,196,114,0.18);
  }
  .stat .num .small{font-size:30px;}
  .stat .lbl{
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.22em;
    text-transform:uppercase;color:var(--dim);margin-top:8px;
  }

  /* 3. the field panel */
  .fieldpanel{
    position:relative;border:1px solid var(--panel-border);border-radius:18px;
    background:var(--panel-bg);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    overflow:hidden;box-shadow:inset 0 0 80px rgba(8,13,28,0.6);
  }
  .fieldpanel .panelhdr{
    position:absolute;top:14px;left:18px;z-index:3;
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.26em;
    text-transform:uppercase;color:var(--dim);pointer-events:none;
  }
  .fieldpanel .panelhint{
    position:absolute;top:14px;right:18px;z-index:3;
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.16em;
    text-transform:uppercase;color:var(--dim);opacity:0.6;pointer-events:none;
  }
  #field{display:block;width:100%;height:auto;}

  /* hover/pin panel */
  #inspector{
    position:fixed;top:24px;right:24px;width:360px;max-width:calc(100vw - 48px);
    z-index:40;
    border:1px solid var(--panel-border);border-radius:14px;
    background:rgba(8,13,28,0.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    box-shadow:0 18px 60px rgba(0,0,0,0.5);
    padding:18px 18px 16px;
    opacity:0;transform:translateY(-6px);pointer-events:none;
    transition:opacity .16s ease,transform .16s ease;
    font-size:13.5px;line-height:1.5;
  }
  #inspector.show{opacity:1;transform:translateY(0);}
  #inspector.pinned{pointer-events:auto;border-color:rgba(255,196,114,0.35);}
  #inspector .kind{
    font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:0.22em;
    text-transform:uppercase;color:var(--dim);display:flex;align-items:center;gap:8px;
    margin-bottom:10px;
  }
  #inspector .swatch{width:9px;height:9px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 8px currentColor;}
  #inspector .quote{
    font-family:'Cormorant Garamond',serif;font-weight:600;font-size:19px;line-height:1.34;
    color:var(--text);margin:0 0 12px;
  }
  #inspector .quote.para{font-style:italic;font-family:'Inter',sans-serif;font-size:14px;font-weight:400;color:#c2d2f5;}
  #inspector .beliefname{
    font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;color:var(--cyan);
    margin:0 0 4px;letter-spacing:0.01em;
  }
  #inspector .gloss{color:var(--dim);font-size:12.5px;margin:0 0 12px;font-style:italic;}
  #inspector .row{
    font-size:12px;color:var(--text);margin:7px 0;
  }
  #inspector .row .k{color:var(--dim);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;display:block;margin-bottom:1px;}
  #inspector .row .v{color:var(--text);}
  #inspector .src{font-size:11.5px;color:#aebcdf;border-top:1px solid rgba(127,217,255,0.12);margin-top:12px;padding-top:11px;}
  #inspector .src .meta{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim);margin-top:6px;}
  #inspector a.open{color:var(--cyan);text-decoration:none;border-bottom:1px solid rgba(127,217,255,0.4);}
  #inspector a.open:hover{color:#aef0ff;}
  #inspector .sublist{margin:6px 0 0;padding:0;list-style:none;}
  #inspector .sublist li{font-size:12px;color:#c2d2f5;padding:3px 0 3px 14px;position:relative;line-height:1.35;}
  #inspector .sublist li::before{content:"›";position:absolute;left:0;color:var(--cyan);opacity:0.7;}
  #inspector .scores{display:flex;gap:18px;margin:10px 0 4px;}
  #inspector .score .sv{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:26px;color:var(--amber);line-height:1;}
  #inspector .score .sl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--dim);margin-top:3px;}
  .chip{
    display:inline-block;font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:0.14em;
    text-transform:uppercase;padding:2px 7px;border-radius:20px;margin-left:6px;vertical-align:middle;
  }
  .chip.private{background:rgba(255,120,150,0.16);color:#ff9bb2;border:1px solid rgba(255,120,150,0.45);}
  .chip.audio{background:rgba(127,217,255,0.12);color:var(--cyan);border:1px solid rgba(127,217,255,0.3);}
  .chip.curated{background:rgba(255,196,114,0.13);color:var(--amber);border:1px solid rgba(255,196,114,0.32);}
  #inspector .pinhint{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--dim);opacity:0.6;margin-top:12px;}
  #inspector .closex{position:absolute;top:12px;right:14px;cursor:pointer;color:var(--dim);font-size:16px;line-height:1;display:none;}
  #inspector.pinned .closex{display:block;}
  #inspector.pinned .closex:hover{color:var(--text);}

  /* 4. sector breakdown */
  .breakhead{
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.3em;
    text-transform:uppercase;color:var(--dim);margin:34px 0 16px 2px;
  }
  .breakgrid{
    display:grid;grid-template-columns:1fr 1fr;gap:18px 40px;
  }
  .sector-card{
    border:1px solid var(--panel-border);border-radius:14px;
    background:var(--panel-bg);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    padding:16px 18px 14px;
  }
  .sector-card .sname{
    display:flex;align-items:baseline;gap:9px;margin-bottom:11px;
    font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:15px;
  }
  .sector-card .sdot{width:11px;height:11px;border-radius:50%;flex:0 0 auto;align-self:center;box-shadow:0 0 8px currentColor;}
  .sector-card .scount{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--dim);letter-spacing:0.06em;margin-left:auto;}
  .sector-card .blist{list-style:none;margin:0;padding:0;}
  .sector-card .blist li{
    display:flex;align-items:baseline;gap:10px;padding:4px 0;
    font-size:13px;border-top:1px dotted rgba(127,217,255,0.10);
  }
  .sector-card .blist li:first-child{border-top:none;}
  .sector-card .bname{color:var(--text);}
  .sector-card .bgloss{color:var(--dim);font-size:11px;font-style:italic;}
  .sector-card .bnum{margin-left:auto;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;color:var(--amber);flex:0 0 auto;}

  .footnote{
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.1em;
    color:var(--dim);opacity:0.7;margin-top:30px;text-align:center;line-height:1.7;
  }
  @media (max-width:880px){
    .breakgrid{grid-template-columns:1fr;}
    #inspector{position:fixed;top:auto;bottom:14px;right:14px;left:14px;width:auto;}
    .stat .num{font-size:38px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">The Belief Field</p>
  <h1 class="title">THE BELIEF FIELD<span class="faint"> · The Data Behind the Voice</span></h1>
  <p class="subject" id="subjectLine"></p>

  <div class="statbar" id="statbar"></div>

  <div class="fieldpanel">
    <div class="panelhdr">The Field — beliefs &amp; their sourced quotes</div>
    <div class="panelhint">hover a dot · click to pin</div>
    <canvas id="field"></canvas>
  </div>

  <div class="breakhead">Sector Breakdown</div>
  <div class="breakgrid" id="breakgrid"></div>

  <p class="footnote" id="footnote"></p>
</div>

<aside id="inspector">
  <span class="closex" id="closex">&times;</span>
  <div id="inspBody"></div>
</aside>

<!-- data: classic script loads, file:// safe -->
<script src="data/belief-db.js"></script>
<script src="data/source-links.js"></script>
<script>
(function(){
  "use strict";
  var DB = window.BELIEF_DB;
  var LINKS = window.SOURCE_LINKS || {};
  if(!DB){ document.getElementById('inspBody').textContent = 'BELIEF_DB failed to load.'; return; }

  /* ---------- helpers ---------- */
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function isPrivate(row){
    return row.register === 'A' || /personality-intake|2026-05-26-jarred/.test(row.source||'');
  }
  function isParaphrase(t){ return /^\s*\(paraphrase\)/i.test(t||''); }
  function capFirst(t){
    if(!t) return t;
    var i = t.search(/[A-Za-z]/);
    if(i<0) return t;
    return t.slice(0,i) + t.charAt(i).toUpperCase() + t.slice(i+1);
  }
  function sectorHsl(hue, l, s){ return 'hsl('+(hue*360).toFixed(0)+','+(s==null?60:s)+'%,'+(l==null?62:l)+'%)'; }
  function linkFor(slug){
    var u = LINKS[slug];
    if(!u) return null;
    if(!/^https?:\/\//i.test(u)) u = 'https://' + u;
    return u;
  }

  /* ---------- index sectors / beliefs ---------- */
  var sectorById = {};
  DB.sectors.forEach(function(s){ sectorById[s.id] = s; });

  // attach combined dot rows per belief (highlights = curated, quotes = comprehensive)
  var beliefs = DB.beliefs.map(function(b){
    var rows = [];
    (b.highlights||[]).forEach(function(h){ rows.push(Object.assign({}, h, {_curated:true})); });
    (b.quotes||[]).forEach(function(q){ rows.push(Object.assign({}, q, {_curated:false})); });
    return {
      ref:b,
      id:b.id, name:b.name, gloss:b.gloss, domain:b.domain,
      evidence:b.evidence_count||0,
      freq:(b.resonance&&b.resonance.frequency)||0,
      conv:(b.resonance&&b.resonance.conviction)||0,
      tier:(b.resonance&&b.resonance.tier_label)||'',
      rows:rows,
      count:rows.length
    };
  });

  /* ---------- stat bar ---------- */
  var sourcedQuotes = (DB.quote_count||0) + (DB.highlight_count||0);
  var stats = [
    {num:DB.belief_count, lbl:'Beliefs'},
    {num:sourcedQuotes, lbl:'Sourced Quotes'},
    {num:DB.sectors.length, lbl:'Sectors'},
    {num:DB.source_count, lbl:'Sources'},
    {num:'2019&ndash;26', lbl:'Span', span:true}
  ];
  document.getElementById('statbar').innerHTML = stats.map(function(s){
    return '<div class="stat"><div class="num">'+(s.span?'<span class="small">'+s.num+'</span>':s.num)+'</div><div class="lbl">'+s.lbl+'</div></div>';
  }).join('');
  document.getElementById('subjectLine').textContent =
    (DB.subject.name||'') + ' · ' + (DB.subject.role||'');
  document.getElementById('footnote').innerHTML =
    'Each dot is a real, dated, sourced utterance. Curated best-verbatim highlights render brighter. '+
    'Register A and 1:1 interview material is flagged PRIVATE and is not public. '+
    esc(DB.subject.name)+' · belief field rendered from '+sourcedQuotes+' quotes across '+DB.source_count+' sources.';

  /* ---------- sector breakdown list ---------- */
  (function(){
    var grid = document.getElementById('breakgrid');
    // group beliefs by sector
    var bySector = {};
    DB.sectors.forEach(function(s){ bySector[s.id] = {sector:s, beliefs:[], quotes:0}; });
    beliefs.forEach(function(b){
      var g = bySector[b.domain]; if(!g) return;
      g.beliefs.push(b); g.quotes += b.count;
    });
    // order sectors by total quote mass desc
    var order = DB.sectors.slice().sort(function(a,b){ return bySector[b.id].quotes - bySector[a.id].quotes; });
    grid.innerHTML = order.map(function(s){
      var g = bySector[s.id];
      var col = sectorHsl(s.hue, 62, 60);
      var bl = g.beliefs.slice().sort(function(a,b){ return b.count - a.count; });
      var top = bl.slice(0, Math.min(5, bl.length));
      var rows = top.map(function(b){
        return '<li><span class="bname">'+esc(b.name)+'</span> '+
               '<span class="bgloss">'+esc(b.gloss||'')+'</span>'+
               '<span class="bnum">'+b.count+'</span></li>';
      }).join('');
      return '<div class="sector-card">'+
        '<div class="sname"><span class="sdot" style="color:'+col+';background:'+col+'"></span>'+
        '<span>'+esc(s.name)+'</span>'+
        '<span class="scount">'+g.beliefs.length+' beliefs · '+g.quotes+' quotes</span></div>'+
        '<ul class="blist">'+rows+'</ul>'+
      '</div>';
    }).join('');
  })();

  /* ================= THE FIELD (canvas) ================= */
  var canvas = document.getElementById('field');
  var ctx = canvas.getContext('2d');
  var dots = [];            // flat hit-test list {x,y,r,type,bi,ri}
  var DPR = Math.max(1, Math.min(2, window.devicePixelRatio||1));
  var Wcss=1340, Hcss=720;  // logical field size

  // ---- sector region layout: weighted columns/rows by quote mass ----
  function layout(){
    dots.length = 0;
    CLOUDS.length = 0;
    var pad = 26;
    // group + mass
    var groups = DB.sectors.map(function(s){
      var bs = beliefs.filter(function(b){ return b.domain===s.id; });
      var mass = bs.reduce(function(a,b){ return a + b.count; }, 0);
      return {sector:s, beliefs:bs, mass:mass};
    }).filter(function(g){ return g.beliefs.length; });

    // Fixed 7-region mosaic tuned to the real mass profile:
    //  crypto(369) huge, biz(220) big, gov(192) big, philo(126) mid, self(67) sm, natl(37) sm, ai(17) tiny.
    // Coordinates are fractions of the field (x,y,w,h). Hand-placed so big clouds never touch.
    var REGION = {
      crypto:{x:0.000, y:0.000, w:0.50, h:0.62},
      gov:   {x:0.50,  y:0.000, w:0.50, h:0.40},
      biz:   {x:0.000, y:0.62,  w:0.55, h:0.38},
      philo: {x:0.50,  y:0.40,  w:0.34, h:0.60},
      self:  {x:0.84,  y:0.40,  w:0.16, h:0.32},
      natl:  {x:0.55,  y:0.62,  w:0.20, h:0.38},
      ai:    {x:0.84,  y:0.72,  w:0.16, h:0.28}
    };

    var innerW = Wcss - pad*2, innerH = Hcss - pad*2;

    groups.forEach(function(g){
      var R = REGION[g.sector.id];
      if(!R) return;
      var rx = pad + R.x*innerW, ry = pad + R.y*innerH;
      var rw = R.w*innerW, rh = R.h*innerH;
      placeSector(g, rx, ry, rw, rh);
    });
  }

  // place one sector's beliefs (cores + revolving clouds) inside a rectangle
  function placeSector(g, rx, ry, rw, rh){
    var s = g.sector;
    var hue = s.hue;
    var sname = s.name;
    var labelPad = 30;          // room for the sector label at top
    var bx = rx + 14, by = ry + labelPad, bw = rw - 28, bh = rh - labelPad - 14;

    // store label position (drawn later)
    g._label = {x:rx + 16, y:ry + 18, hue:hue, name:sname,
                beliefN:g.beliefs.length, quoteN:g.mass};

    // core radius & cloud radius per belief
    // cloudR sized for ~constant areal density: R = s*sqrt(n/pi) (s = center-to-center spacing)
    var SPACING = 4.6;
    var bs = g.beliefs.map(function(b){
      var coreR = 3.2 + Math.sqrt(b.evidence) * 0.55;      // core scales w/ evidence
      coreR = Math.min(coreR, 9.5);
      var inner = coreR + 3.5;
      var cloudR = inner + SPACING * Math.sqrt(b.count / Math.PI);
      return {b:b, coreR:coreR, inner:inner, cloudR:cloudR, area:cloudR*cloudR};
    });
    // order big-first for stable packing
    bs.sort(function(a,b){ return b.cloudR - a.cloudR; });

    // simple non-overlapping placement: try points on a jittered spiral within box,
    // accept if it clears all placed clouds by a margin.
    var placed = [];
    var cx = bx + bw/2, cy = by + bh/2;
    var maxR = Math.max(bw, bh);

    bs.forEach(function(item){
      var best=null, bestClear=-Infinity;
      var tries = 700;
      var mR = item.cloudR;
      for(var t=0; t<tries; t++){
        // sample core centers uniformly across the FULL region box (minus cloud margin)
        // so clusters spread to fill the area instead of huddling at center.
        var loX = bx + mR, hiX = bx + bw - mR;
        var loY = by + mR, hiY = by + bh - mR;
        if(hiX < loX){ loX = hiX = cx; }
        if(hiY < loY){ loY = hiY = cy; }
        var px = loX + Math.random()*(hiX-loX);
        var py = loY + Math.random()*(hiY-loY);
        // clearance vs already-placed clouds
        var ok=true, minClear=Infinity;
        for(var k=0;k<placed.length;k++){
          var p=placed[k];
          var d=Math.hypot(px-p.x, py-p.y);
          var need=item.cloudR + p.cloudR + 5;
          if(d < need){ ok=false; break; }
          minClear = Math.min(minClear, d-need);
        }
        if(ok){
          // prefer the most open spot (maximize clearance) -> spreads clusters apart
          var clear = placed.length ? minClear : Math.random();
          if(clear > bestClear){ bestClear=clear; best={x:px,y:py}; }
          if(t>140 && best) break;
        }
      }
      if(!best){
        // fallback: shrink cloud slightly and drop at a random box spot
        item.cloudR *= 0.85;
        best = {x: bx + item.cloudR + Math.random()*(bw-2*item.cloudR),
                y: by + item.cloudR + Math.random()*(bh-2*item.cloudR)};
        if(isNaN(best.x)) best.x = cx; if(isNaN(best.y)) best.y = cy;
      }
      item.x=best.x; item.y=best.y;
      placed.push({x:best.x, y:best.y, cloudR:item.cloudR});
    });

    // emit dots: core + tight quote cloud via golden-angle (phyllotaxis) fill, with
    // small organic jitter so it reads as a cloud, not a math spiral. No spoke lines.
    var GOLDEN = Math.PI * (3 - Math.sqrt(5));   // ~2.39996 rad
    bs.forEach(function(item){
      var b = item.b, bi = beliefs.indexOf(b);
      dots.push({type:'core', x:item.x, y:item.y, r:item.coreR, hue:hue, bi:bi, ri:-1});
      CLOUDS.push({x:item.x, y:item.y, R:item.cloudR, hue:hue});

      var rows = b.rows;
      var n = rows.length;
      if(!n) return;
      var inner = item.inner;
      var R = item.cloudR;
      var i2 = inner*inner, span = R*R - i2;
      var jit = Math.min(3.2, R/14);               // radial jitter scaled to cloud size
      for(var i=0;i<n;i++){
        var tt = (i + 0.5) / n;
        var rr = Math.sqrt(i2 + tt*span);          // r ~ sqrt -> equal area per dot
        // strong angular jitter breaks the phyllotaxis spiral into an organic cloud
        var a  = i * GOLDEN + (Math.random()-0.5)*1.4;
        rr += (Math.random()-0.5)*jit;
        var qx = item.x + Math.cos(a)*rr;
        var qy = item.y + Math.sin(a)*rr;
        var row = rows[i];
        var dr = row._curated ? 2.5 : 1.9;
        dots.push({type:'quote', x:qx, y:qy, r:dr, hue:hue, bi:bi, ri:i,
                   curated:row._curated, priv:isPrivate(row), audio:!!row.audio_verify});
      }
    });

    // stash labels on a global list
    LABELS.push(g._label);
  }

  var LABELS = [];
  var CLOUDS = [];

  // offscreen static field (painted once per layout)
  var stat = document.createElement('canvas');
  var sctx = stat.getContext('2d');

  /* ---------- build layout + paint static field ONCE ---------- */
  function build(){
    LABELS.length = 0;
    layout();   // re-packs dots[] (uses Math.random) — must only run here, never per-hover

    canvas.width = Wcss*DPR;
    canvas.height = Hcss*DPR;
    canvas.style.aspectRatio = Wcss + ' / ' + Hcss;
    stat.width = Wcss*DPR;
    stat.height = Hcss*DPR;
    sctx.setTransform(DPR,0,0,DPR,0,0);
    sctx.clearRect(0,0,Wcss,Hcss);

    // soft nebula disc under each cluster — conveys grouping WITHOUT radial spoke lines
    // (connectors were removed: with a tight phyllotaxis cloud they read as fireworks).
    sctx.globalCompositeOperation='lighter';
    CLOUDS.forEach(function(cl){
      var h = (cl.hue*360).toFixed(0);
      var g = sctx.createRadialGradient(cl.x,cl.y,0, cl.x,cl.y, cl.R*1.18);
      g.addColorStop(0, 'hsla('+h+',45%,40%,0.085)');
      g.addColorStop(0.6,'hsla('+h+',45%,38%,0.045)');
      g.addColorStop(1, 'hsla('+h+',45%,36%,0)');
      sctx.fillStyle=g;
      sctx.beginPath(); sctx.arc(cl.x,cl.y,cl.R*1.18,0,6.2832); sctx.fill();
    });

    // quote halos: 'lighter' for soft luminous glow (low alpha, won't blow out)
    sctx.globalCompositeOperation='lighter';
    dots.forEach(function(d){
      if(d.type!=='quote') return;
      var h = (d.hue*360).toFixed(0);
      var lite = d.curated ? 68 : 58;
      var coreA = d.curated ? 0.42 : 0.30;
      var g = sctx.createRadialGradient(d.x,d.y,0, d.x,d.y, d.r*3.4);
      g.addColorStop(0, 'hsla('+h+',58%,'+lite+'%,'+coreA+')');
      g.addColorStop(0.45,'hsla('+h+',56%,'+(lite-6)+'%,0.14)');
      g.addColorStop(1, 'hsla('+h+',56%,'+(lite-10)+'%,0)');
      sctx.fillStyle=g;
      sctx.beginPath(); sctx.arc(d.x,d.y,d.r*3.4,0,6.2832); sctx.fill();
    });

    // crisp small dot centers in normal blend (keeps them flat, not hot-white)
    sctx.globalCompositeOperation='source-over';
    dots.forEach(function(d){
      if(d.type!=='quote') return;
      var h = (d.hue*360).toFixed(0);
      var lite = d.curated ? 74 : 64;
      sctx.fillStyle='hsla('+h+',55%,'+lite+'%,'+(d.curated?0.92:0.72)+')';
      sctx.beginPath(); sctx.arc(d.x,d.y,d.r,0,6.2832); sctx.fill();
      if(d.priv){
        sctx.strokeStyle='rgba(255,140,165,0.85)'; sctx.lineWidth=1;
        sctx.beginPath(); sctx.arc(d.x,d.y,d.r+1.8,0,6.2832); sctx.stroke();
      }
    });

    // belief cores: a SMALL bright dot (not a sun). Tight halo so it doesn't wash out the cloud.
    sctx.globalCompositeOperation='lighter';
    dots.forEach(function(d){
      if(d.type!=='core') return;
      var h = (d.hue*360).toFixed(0);
      var g = sctx.createRadialGradient(d.x,d.y,0, d.x,d.y, d.r*1.4);
      g.addColorStop(0, 'hsla('+h+',60%,66%,0.30)');
      g.addColorStop(0.5,'hsla('+h+',58%,60%,0.12)');
      g.addColorStop(1, 'hsla('+h+',56%,55%,0)');
      sctx.fillStyle=g;
      sctx.beginPath(); sctx.arc(d.x,d.y,d.r*1.4,0,6.2832); sctx.fill();
    });
    sctx.globalCompositeOperation='source-over';
    dots.forEach(function(d){
      if(d.type!=='core') return;
      var h = (d.hue*360).toFixed(0);
      // solid disc (slightly larger / brighter than quote dots)
      sctx.fillStyle='hsla('+h+',55%,62%,0.96)';
      sctx.beginPath(); sctx.arc(d.x,d.y,d.r,0,6.2832); sctx.fill();
      // bright pin
      sctx.fillStyle='hsla('+h+',72%,88%,0.95)';
      sctx.beginPath(); sctx.arc(d.x,d.y,Math.max(1.4,d.r*0.45),0,6.2832); sctx.fill();
    });

    // sector labels
    LABELS.forEach(function(l){
      sctx.font = '700 12px "JetBrains Mono", monospace';
      sctx.textBaseline='alphabetic';
      sctx.fillStyle = sectorHsl(l.hue, 72, 52);
      sctx.shadowColor='rgba(0,0,0,0.7)'; sctx.shadowBlur=7;
      sctx.fillText(l.name.toUpperCase(), l.x, l.y);
      sctx.shadowBlur=0;
      sctx.font = '400 10px "JetBrains Mono", monospace';
      sctx.fillStyle = 'rgba(125,141,179,0.85)';
      sctx.fillText(l.beliefN+' beliefs · '+l.quoteN+' quotes', l.x, l.y+14);
    });

    draw();
  }

  /* ---------- per-frame draw: blit static field + active ring ---------- */
  function draw(){
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(stat, 0, 0);
    ctx.setTransform(DPR,0,0,DPR,0,0);
    if(activeIdx>=0 && dots[activeIdx]) drawActiveRing(dots[activeIdx]);
  }

  function drawActiveRing(d){
    ctx.save();
    // soften the rest is too costly; just ring + a touch of glow on the active dot
    ctx.strokeStyle = d.type==='core' ? 'rgba(255,196,114,0.95)' : 'rgba(127,217,255,0.95)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(d.x, d.y, (d.type==='core'? d.r*1.4+2 : d.r*3.4)+3, 0, 6.2832);
    ctx.stroke();
    ctx.restore();
  }

  /* ---------- hit testing ---------- */
  var activeIdx = -1, pinned = false;
  function hitTest(mx, my){
    var best=-1, bestD=Infinity;
    for(var i=0;i<dots.length;i++){
      var d=dots[i];
      var rad = (d.type==='core'? d.r*1.4+3 : d.r*3.4);
      var tol = (d.type==='core'? 6 : 4);
      var dd = Math.hypot(mx-d.x, my-d.y);
      if(dd <= rad + tol){
        // cores get priority (subtract bias so they win ties)
        var score = dd - (d.type==='core'? 1000 : 0);
        if(score < bestD){ bestD=score; best=i; }
      }
    }
    return best;
  }

  var insp = document.getElementById('inspector');
  var inspBody = document.getElementById('inspBody');
  document.getElementById('closex').addEventListener('click', function(){ pinned=false; insp.classList.remove('show','pinned'); activeIdx=-1; draw(); });

  function showInspector(i){
    var d = dots[i];
    var b = beliefs[d.bi];
    inspBody.innerHTML = (d.type==='core') ? renderCore(b) : renderQuote(b, b.rows[d.ri]);
    insp.classList.add('show');
  }

  function renderCore(b){
    // distinct sub-beliefs among quotes
    var subs=[], seen={};
    b.rows.forEach(function(r){ if(r.belief && !seen[r.belief]){ seen[r.belief]=1; subs.push(r.belief); } });
    var subList = subs.slice(0,6).map(function(x){ return '<li>'+esc(x)+'</li>'; }).join('');
    var col = sectorHsl(b.domain ? sectorById[b.domain].hue : 0.5, 66, 60);
    return ''+
      '<div class="kind"><span class="swatch" style="color:'+col+';background:'+col+'"></span>Belief Core'+(b.tier?' · '+esc(b.tier):'')+'</div>'+
      '<div class="beliefname">'+esc(b.name)+'</div>'+
      '<div class="gloss">'+esc(b.gloss||'')+'</div>'+
      '<div class="scores">'+
        '<div class="score"><div class="sv">'+b.freq+'</div><div class="sl">Frequency</div></div>'+
        '<div class="score"><div class="sv">'+b.conv+'</div><div class="sl">Conviction</div></div>'+
        '<div class="score"><div class="sv">'+b.evidence+'</div><div class="sl">Evidence</div></div>'+
      '</div>'+
      (subList ? '<div class="row"><span class="k">Supporting sub-beliefs</span></div><ul class="sublist">'+subList+'</ul>' : '')+
      '<div class="pinhint">'+b.count+' sourced quotes orbit this core</div>';
  }

  function renderQuote(b, row){
    var col = sectorHsl(b.domain ? sectorById[b.domain].hue : 0.5, 66, 60);
    var para = isParaphrase(row.text);
    var priv = isPrivate(row);
    var src = (DB.sources && DB.sources[row.source]) || null;
    var srcTitle = src ? src.title : (row.source || 'unknown source');
    var url = linkFor(row.source);

    var quoteHtml;
    if(para){
      var cleaned = row.text.replace(/^\s*\(paraphrase\)\s*/i,'');
      quoteHtml = '<p class="quote para">'+esc(capFirst(cleaned))+'</p>';
    } else {
      quoteHtml = '<p class="quote">“'+esc(capFirst(row.text))+'”</p>';
    }

    var chips = '';
    if(row._curated) chips += '<span class="chip curated">Curated</span>';
    if(priv) chips += '<span class="chip private">Private</span>';
    if(row.audio_verify) chips += '<span class="chip audio">Audio-verify</span>';

    var supports = '<div class="row"><span class="k">Supports</span><span class="v">'+esc(b.name)+'</span></div>';
    var subRow = '';
    if(row.belief){
      subRow = '<div class="row"><span class="k">Sub-belief</span><span class="v">'+esc(row.belief)+'</span></div>';
    } else if(row.context){
      subRow = '<div class="row"><span class="k">Context</span><span class="v">'+esc(row.context)+'</span></div>';
    } else if(row.theme_raw){
      subRow = '<div class="row"><span class="k">Theme</span><span class="v">'+esc(row.theme_raw)+'</span></div>';
    }

    var srcLine = '<div class="src">'+esc(srcTitle)+
      (url ? ' &nbsp;<a class="open" href="'+esc(url)+'" target="_blank" rel="noopener">open ↗</a>' : '')+
      '<div class="meta">'+esc(row.date||'')+
        (row.register?' · register '+esc(row.register):'')+
        (row.prompted?' · '+(row.prompted==='P'?'prompted':'volunteered'):'')+
      '</div>'+
      (row.audio_verify ? '<div class="meta" style="color:#7fd9ff;opacity:0.8">pending audio verification</div>' : '')+
    '</div>';

    return ''+
      '<div class="kind"><span class="swatch" style="color:'+col+';background:'+col+'"></span>'+(para?'Paraphrase':'Sourced Quote')+chips+'</div>'+
      quoteHtml + supports + subRow + srcLine;
  }

  /* ---------- mouse events ---------- */
  function canvasPos(ev){
    var r = canvas.getBoundingClientRect();
    var sx = Wcss / r.width, sy = Hcss / r.height;
    return { x:(ev.clientX - r.left)*sx, y:(ev.clientY - r.top)*sy };
  }
  canvas.addEventListener('mousemove', function(ev){
    if(pinned) return;
    var p = canvasPos(ev);
    var i = hitTest(p.x, p.y);
    if(i !== activeIdx){
      activeIdx = i;
      if(i>=0){ showInspector(i); canvas.style.cursor='pointer'; }
      else { insp.classList.remove('show'); canvas.style.cursor='default'; }
      draw();
    }
  });
  canvas.addEventListener('mouseleave', function(){
    if(pinned) return;
    activeIdx=-1; insp.classList.remove('show'); canvas.style.cursor='default'; draw();
  });
  canvas.addEventListener('click', function(ev){
    var p = canvasPos(ev);
    var i = hitTest(p.x, p.y);
    if(i>=0){
      activeIdx=i; pinned=true;
      showInspector(i);
      insp.classList.add('show','pinned');
      draw();
    } else {
      pinned=false; insp.classList.remove('pinned');
      activeIdx=-1; insp.classList.remove('show'); draw();
    }
  });

  /* ---------- init + resize ---------- */
  build();
  var rt;
  window.addEventListener('resize', function(){
    clearTimeout(rt);
    rt = setTimeout(function(){ DPR=Math.max(1,Math.min(2,window.devicePixelRatio||1)); build(); }, 150);
  });
})();
</script>
</body>
</html>
